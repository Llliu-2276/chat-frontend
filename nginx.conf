# ============================================================================
# Chat 前端 Nginx 部署配置
# 适用场景：内网穿透 + 生产部署
# Windows 版 Nginx 注意事项：
#   - worker_processes 只能设为 1（Windows 不支持多 worker）
#   - 路径使用正斜杠 /，如 D:/www/dist
#   - 启动命令：cd C:\nginx-1.30.2 && start nginx
#   - 重载配置：nginx -s reload
#   - 停止服务：nginx -s stop
# ============================================================================

# Windows 下只能设为 1
worker_processes 1;

# 事件模型（Windows 使用 select）
events {
    worker_connections 1024;
}

# HTTP 层配置
http {
    # 引入 MIME 类型映射（必需，否则 CSS/JS 无法正确加载）
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log logs/access.log main;
    error_log  logs/error.log warn;

    # 高效传输
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # 后端服务地址（Spring Boot）
    upstream chat_backend {
        server 127.0.0.1:8080;
        # 如后端在远程服务器，改为：server your-backend-ip:8080;
    }

server {
    # 监听端口
    # 内网穿透：穿透工具转发到此端口（如 80）
    # 生产环境：80（HTTP）或 443（HTTPS）
    listen 80;
    server_name _;
    # 如有域名，改为：server_name yourdomain.com;

    # -----------------------------------------------------------------------
    # 前端静态资源（vite build 生成的 dist 目录）
    # Windows 路径使用正斜杠 /，Nginx 规范
    # -----------------------------------------------------------------------
    root D:/PersonalFiles/WebStormProjects/chat_frontend/dist;
    index index.html;

    # -----------------------------------------------------------------------
    # Gzip 压缩（减少 60~70% 传输体积，显著提升加载速度）
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -----------------------------------------------------------------------
    # 静态资源缓存（文件名含 hash，可永久缓存）
    # -----------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # API 反向代理（解决跨域，统一域名）
    # 前端请求 /api/xxx → Nginx 转发到 http://localhost:8080/api/xxx
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://chat_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 请求超时（后端处理慢的接口）
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # -----------------------------------------------------------------------
    # WebSocket 反向代理（实时通信核心）
    # 前端请求 /ws/chat → Nginx 转发到 ws://localhost:8080/ws/chat
    # -----------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://chat_backend/ws/;
        proxy_http_version 1.1;
        # 关键：WebSocket 协议升级的两个必需头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 长连接超时（建议略大于心跳间隔，心跳 2min，这里设 5min）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # -----------------------------------------------------------------------
    # SPA 路由兜底（Vue Router history 模式必需）
    # 所有不匹配文件的请求都返回 index.html，避免刷新 404
    # -----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存，确保用户总是加载最新版本
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # -----------------------------------------------------------------------
    # 安全头（可选但推荐）
    # -----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# ============================================================================
# HTTPS 配置（生产环境推荐，内网穿透可跳过）
# 取消注释以下 server 块，替换域名和证书路径
# ============================================================================
# server {
#     listen 443 ssl http2;
#     server_name yourdomain.com;
#
#     ssl_certificate     /etc/nginx/ssl/yourdomain.crt;
#     ssl_certificate_key /etc/nginx/ssl/yourdomain.key;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#
#     # 其余配置与上面 server 块完全相同，复制即可
#     root D:/PersonalFiles/WebStormProjects/chat_frontend/dist;
#     index index.html;
#     # ... (gzip / location /api/ / /ws/ / 同上)
# }
#
# # HTTP → HTTPS 强制跳转
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$host$request_uri;
# }

} # ← http {} 块结束
